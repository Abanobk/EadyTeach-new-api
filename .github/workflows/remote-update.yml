name: Remote Update
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # الأمر ده هيدخل السيرفر ويدور على الفولدر ويحدثه أينما كان
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
          -o ProxyCommand="cloudflared access tcp --hostname ssh-deploy.easytecheg.net" \
          root@ssh-deploy.easytecheg.net << 'EOF'
            TARGET=$(find /mnt -name "easytech-new-api" -type d -print -quit 2>/dev/null)
            if [ -n "$TARGET" ]; then
              echo "Found directory at $TARGET"
              cd "$TARGET"
              git pull origin main
            else
              echo "Directory not found in /mnt, checking /root"
              if [ -d "/root/easytech-new-api" ]; then
                cd /root/easytech-new-api && git pull origin main
              else
                echo "Project folder not found anywhere!"
                exit 1
              fi
            fi
          EOF
