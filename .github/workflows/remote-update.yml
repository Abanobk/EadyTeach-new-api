# نشر الويب + اختياري Backend (عشان يروح router.php للسيرفر ويختفي 404)
# Secrets: CF_SERVICE_TOKEN_ID, CF_SERVICE_TOKEN_SECRET, SERVER_SSH_KEY, WEB_DEPLOY_PATH
# اختياري: CF_TUNNEL_HOST. لرفع الـ API: BACKEND_DEPLOY_PATH = المسار على السيرفر اللي فيه router.php (مثلاً مجلد الـ API)
name: Remote Update
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web
        run: |
          flutter pub get
          flutter build web --base-href "/app/"
          [ -f build/web/index.html ] || { echo "::error::Build failed"; exit 1; }

      # لو فيه DIRECT_SSH_HOST هنستخدم SSH مباشر (أسهل وأسرع) ونسيب Cloudflare للاحتياط.
      - name: Deploy via Direct SSH (if DIRECT_SSH_HOST is set)
        if: ${{ secrets.DIRECT_SSH_HOST != '' }}
        env:
          DIRECT_SSH_HOST: ${{ secrets.DIRECT_SSH_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          WEB_DEPLOY_PATH: ${{ secrets.WEB_DEPLOY_PATH }}
          BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
        run: |
          set -e
          DEPLOY_PATH="${WEB_DEPLOY_PATH:-/mnt/marichia/files/easytech-new-api/app}"
          HOST="$DIRECT_SSH_HOST"

          if [ -z "$HOST" ]; then
            echo "::error::DIRECT_SSH_HOST is empty"
            exit 1
          fi
          if [ -z "$SERVER_SSH_KEY" ]; then
            echo "::error::Add SERVER_SSH_KEY in repo Secrets"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Creating archive..."
          tar czf /tmp/deploy.tar -C build web

          echo "Uploading to $HOST..."
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/id_rsa \
            /tmp/deploy.tar root@"$HOST":/tmp/deploy.tar

          echo "Extracting on server..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/id_rsa \
            root@"$HOST" "mkdir -p '$DEPLOY_PATH' && cd '$DEPLOY_PATH' && tar xzf /tmp/deploy.tar --strip-components=1 && rm -f /tmp/deploy.tar && echo Deployed to $DEPLOY_PATH"

          # اختيارى: لو BACKEND_DEPLOY_PATH متضبط نرفع backend/ كمان
          if [ -n \"$BACKEND_DEPLOY_PATH\" ]; then
            echo \"Deploying backend to $BACKEND_DEPLOY_PATH...\"
            tar czf /tmp/backend.tar -C \"$GITHUB_WORKSPACE\" backend
            scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/id_rsa \
              /tmp/backend.tar root@\"$HOST\":/tmp/backend.tar
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/id_rsa \
              root@\"$HOST\" \"mkdir -p '$BACKEND_DEPLOY_PATH' && cd '$BACKEND_DEPLOY_PATH' && tar xzf /tmp/backend.tar --strip-components=1 && rm -f /tmp/backend.tar && echo Backend deployed\"
          else
            echo \"Skipping backend deploy (BACKEND_DEPLOY_PATH not set)\"
          fi

      - name: Install Cloudflared
        if: ${{ secrets.DIRECT_SSH_HOST == '' }}
        run: |
          curl -LsSf -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Deploy via Cloudflare Tunnel (SSH over tunnel)
        if: ${{ secrets.DIRECT_SSH_HOST == '' }}
        env:
          CF_TUNNEL_HOST: ${{ secrets.CF_TUNNEL_HOST }}
          CF_SERVICE_TOKEN_ID: ${{ secrets.CF_SERVICE_TOKEN_ID }}
          CF_SERVICE_TOKEN_SECRET: ${{ secrets.CF_SERVICE_TOKEN_SECRET }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          WEB_DEPLOY_PATH: ${{ secrets.WEB_DEPLOY_PATH }}
        run: |
          set -e
          DEPLOY_PATH="${WEB_DEPLOY_PATH:-/mnt/marichia/files/easytech-new-api/app}"
          CF_HOST="${CF_TUNNEL_HOST:-ssh-deploy.easytecheg.net}"

          if [ -z "$CF_SERVICE_TOKEN_ID" ] || [ -z "$CF_SERVICE_TOKEN_SECRET" ]; then
            echo "::error::Add CF_SERVICE_TOKEN_ID and CF_SERVICE_TOKEN_SECRET in repo Secrets"
            exit 1
          fi
          if [ -z "$SERVER_SSH_KEY" ]; then
            echo "::error::Add SERVER_SSH_KEY in repo Secrets"
            exit 1
          fi

          export TUNNEL_SERVICE_TOKEN_ID="$CF_SERVICE_TOKEN_ID"
          export TUNNEL_SERVICE_TOKEN_SECRET="$CF_SERVICE_TOKEN_SECRET"

          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Creating archive..."
          tar czf /tmp/deploy.tar -C build web

          echo "Uploading via Cloudflare Tunnel ($CF_HOST)..."
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=90 -i ~/.ssh/id_rsa \
            -o "ProxyCommand=cloudflared access tcp --hostname $CF_HOST" \
            /tmp/deploy.tar root@$CF_HOST:/tmp/deploy.tar

          echo "Extracting on server..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=90 -i ~/.ssh/id_rsa \
            -o "ProxyCommand=cloudflared access tcp --hostname $CF_HOST" \
            root@$CF_HOST "mkdir -p '$DEPLOY_PATH' && cd '$DEPLOY_PATH' && tar xzf /tmp/deploy.tar --strip-components=1 && rm -f /tmp/deploy.tar && echo Deployed to $DEPLOY_PATH"

      - name: Deploy Backend (if BACKEND_DEPLOY_PATH is set)
        if: ${{ secrets.DIRECT_SSH_HOST == '' }}
        env:
          CF_TUNNEL_HOST: ${{ secrets.CF_TUNNEL_HOST }}
          CF_SERVICE_TOKEN_ID: ${{ secrets.CF_SERVICE_TOKEN_ID }}
          CF_SERVICE_TOKEN_SECRET: ${{ secrets.CF_SERVICE_TOKEN_SECRET }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
        run: |
          if [ -z "$BACKEND_DEPLOY_PATH" ]; then
            echo "Skipping backend deploy (BACKEND_DEPLOY_PATH not set). To fix 404: upload backend/ (especially router.php) to your API server or set this secret."
            exit 0
          fi
          set -e
          CF_HOST="${CF_TUNNEL_HOST:-ssh-deploy.easytecheg.net}"
          export TUNNEL_SERVICE_TOKEN_ID="$CF_SERVICE_TOKEN_ID"
          export TUNNEL_SERVICE_TOKEN_SECRET="$CF_SERVICE_TOKEN_SECRET"
          echo "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          tar czf /tmp/backend.tar -C "$GITHUB_WORKSPACE" backend
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=90 -i ~/.ssh/id_rsa \
            -o "ProxyCommand=cloudflared access tcp --hostname $CF_HOST" \
            /tmp/backend.tar root@$CF_HOST:/tmp/backend.tar
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=90 -i ~/.ssh/id_rsa \
            -o "ProxyCommand=cloudflared access tcp --hostname $CF_HOST" \
            root@$CF_HOST "mkdir -p '$BACKEND_DEPLOY_PATH' && cd '$BACKEND_DEPLOY_PATH' && tar xzf /tmp/backend.tar --strip-components=1 && rm -f /tmp/backend.tar && echo Backend deployed"
          echo "Backend (router.php etc.) deployed to $BACKEND_DEPLOY_PATH"

      - name: Done
        run: echo "✅ Deploy finished. Open https://api.easytecheg.net/app and hard refresh (Ctrl+F5)."
