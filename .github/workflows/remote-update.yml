name: Remote Update
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
          -o ProxyCommand="cloudflared access tcp --hostname ssh-deploy.easytecheg.net" \
          root@ssh-deploy.easytecheg.net << 'EOF'
            TARGET="/mnt/marichia/files/easytech-new-api"
            
            # حل مشكلة الثقة في الفولدر
            git config --global --add safe.directory "$TARGET"
            
            cd "$TARGET"
            
            # لو الفولدر مش مربوط بجيت، نربطه
            if [ ! -d ".git" ]; then
                git init
                git remote add origin https://github.com/Abanobk/EadyTeach-new-api.git
                git add .
                git commit -m "Backup of existing files before first deploy"
            fi
            
            # تحديث الكود "بذكاء" وبدون مسح ملفاتك
            git fetch origin main
            git merge -X theirs origin/main --allow-unrelated-histories
          EOF
