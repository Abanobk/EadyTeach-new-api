# نشر الويب + اختياري Backend
# Secrets شائعة: SERVER_SSH_KEY, WEB_DEPLOY_PATH, CF_SERVICE_TOKEN_*, CF_TUNNEL_HOST
#
# الافتراضي: Cloudflare Tunnel (cloudflared access tcp).
# SSH مباشر من CI: لازم معًا — USE_DIRECT_SSH_FOR_CI = 1 أو true **و** DIRECT_SSH_HOST.
# (وجود DIRECT_SSH_HOST وحده يُتجاهل لتفادي فشل Network unreachable من غير قصد.)
name: Remote Update


permissions:
  contents: read


  concurrency:
    group: remote-update-${{ github.ref }}
      cancel-in-progress: true


      on:
        push:
            branches: [ main ]
              workflow_dispatch:
                  inputs:
                        deploy_target:
                                description: "What to deploy"
                                        required: true
                                                default: "both"
                                                        type: choice
                                                                options:
                                                                          - both
                                                                                    - web
                                                                                              - backend


                                                                                              jobs:
                                                                                                deploy:
                                                                                                    runs-on: ubuntu-latest
                                                                                                        timeout-minutes: 30
                                                                                                            steps:
                                                                                                                  - uses: actions/checkout@v5
                                                                                                                  
                                                                                                                        - name: Setup Flutter
                                                                                                                                uses: subosito/flutter-action@v2
                                                                                                                                        with:
                                                                                                                                                  channel: 'stable'
                                                                                                                                                            cache: true
                                                                                                                                                            
                                                                                                                                                                  - name: Build Web
                                                                                                                                                                          if: ${{ github.event_name == 'push' || github.event.inputs.deploy_target == 'both' || github.event.inputs.deploy_target == 'web' }}
                                                                                                                                                                                  run: |
                                                                                                                                                                                            set -e
                                                                                                                                                                                                      flutter --version
                                                                                                                                                                                                          
