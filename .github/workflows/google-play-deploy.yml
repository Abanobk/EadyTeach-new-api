name: Google Play Deploy
on:
  push:
    tags:
      - 'v*' # هيشتغل لما كورسيس يعمل Tag للنسخة بـ v1.0.0 مثلاً

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Android signing files
        shell: bash
        run: |
          set -euo pipefail

          # Decode upload keystore (base64) into android/app/upload-keystore.jks
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

          # Generate android/key.properties expected by android/app/build.gradle
          cat > android/key.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

          # Sanity check (avoid printing secrets)
          test -s android/app/upload-keystore.jks
          test -s android/key.properties

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release Bundle
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonKeyData: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.easytech.easy_tech_flutter
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal # بيبدأ برفعه على الـ Internal testing عشان تجربه الأول
