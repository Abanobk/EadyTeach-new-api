name: Remote Update
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Pull
        uses: appleboy/ssh-action@master
        with:
          host: 100.92.194.111
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /mnt/pool/data/easytech-new-api
            git pull origin main
