name: Google Play Deploy
on:
  push:
    tags:
      - 'v*' # هيشتغل لما كورسيس يعمل Tag للنسخة بـ v1.0.0 مثلاً

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          # Decode keystore: strip all whitespace (macOS base64 often wraps lines) then base64-decode.
          python3 - <<'PY'
          import base64
          import os
          import pathlib

          raw = os.environ.get("ANDROID_KEYSTORE_BASE64", "")
          s = "".join(raw.split())
          if not s:
              raise SystemExit("ANDROID_KEYSTORE_BASE64 is empty")
          pad = (-len(s)) % 4
          s += "=" * pad
          data = base64.b64decode(s, validate=False)
          if len(data) < 100:
              raise SystemExit("Decoded keystore looks too small; check ANDROID_KEYSTORE_BASE64")
          pathlib.Path("android/app/upload-keystore.jks").write_bytes(data)
          PY

          # android/app/build.gradle reads android/key.properties (no leading spaces)
          : > android/key.properties
          printf '%s\n' "storePassword=${ANDROID_KEYSTORE_PASSWORD}" >> android/key.properties
          printf '%s\n' "keyPassword=${ANDROID_KEY_PASSWORD}" >> android/key.properties
          printf '%s\n' "keyAlias=${ANDROID_KEY_ALIAS}" >> android/key.properties
          printf '%s\n' "storeFile=upload-keystore.jks" >> android/key.properties

          test -s android/app/upload-keystore.jks
          test -s android/key.properties

      - name: Verify signing secrets (no values printed)
        run: |
          python3 - <<'PY'
          import pathlib
          txt = pathlib.Path("android/key.properties").read_text(encoding="utf-8")
          for raw in txt.splitlines():
            line = raw.strip()
            if not line or line.startswith("#"):
              continue
            if "=" not in line:
              continue
            k, v = line.split("=", 1)
            k, v = k.strip(), v.strip()
            if not v:
              raise SystemExit(
                f"Empty value for '{k}' in android/key.properties. "
                "In GitHub: Settings → Secrets → Actions → ensure ANDROID_KEYSTORE_PASSWORD, "
                "ANDROID_KEY_PASSWORD, and ANDROID_KEY_ALIAS are set (names must match exactly)."
              )
          print("key.properties OK (all keys non-empty).")
          PY
          ls -la android/key.properties android/app/upload-keystore.jks

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release Bundle
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonKeyData: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.easytech.easy_tech_flutter
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal # بيبدأ برفعه على الـ Internal testing عشان تجربه الأول
