# التعديلات الجديدة تظهر على السيرفر: بناء الويب ثم رفع build/web (مع المسارات والأصول الصحيحة)
name: Remote Update
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build web (with base href and assets)
        run: |
          cd "$GITHUB_WORKSPACE"
          flutter pub get
          flutter build web --release --base-href=/app/
          if [ ! -f build/web/index.html ]; then
            echo "::error::Build failed: build/web/index.html not found"
            exit 1
          fi
          echo "Build OK: $(ls -la build/web/ | head -20)"

      - name: Install Cloudflared
        run: |
          curl -LsSf --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          which cloudflared || true

      - name: Setup SSH and deploy
        env:
          DEPLOY_PATH: ${{ secrets.WEB_DEPLOY_PATH }}
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::WEB_DEPLOY_PATH not set in Secrets"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          CF=$(which cloudflared || echo "/usr/bin/cloudflared")
          cd "$GITHUB_WORKSPACE"
          tar czf /tmp/deploy.tar -C build web
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            -o "ProxyCommand=$CF access tcp --hostname ssh-deploy.easytecheg.net" \
            /tmp/deploy.tar root@ssh-deploy.easytecheg.net:/tmp/deploy.tar
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            -o "ProxyCommand=$CF access tcp --hostname ssh-deploy.easytecheg.net" \
            root@ssh-deploy.easytecheg.net "mkdir -p '$DEPLOY_PATH' && cd '$DEPLOY_PATH' && tar xzf /tmp/deploy.tar --strip-components=1 && rm -f /tmp/deploy.tar && echo Deployed to $DEPLOY_PATH"

      - name: Update repo on server
        run: |
          CF=$(which cloudflared || echo "/usr/bin/cloudflared")
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            -o "ProxyCommand=$CF access tcp --hostname ssh-deploy.easytecheg.net" \
            root@ssh-deploy.easytecheg.net "TARGET=/mnt/marichia/files/easytech-new-api; git config --global --add safe.directory \$TARGET; cd \$TARGET; git fetch origin main; git checkout origin/main -- .; echo Repo updated."

      - name: Done
        run: echo "✅ Deploy finished. Open https://api.easytecheg.net/app and hard refresh (Ctrl+F5)."