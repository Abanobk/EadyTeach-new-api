name: Remote Update
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web
        run: |
          flutter pub get
          flutter build web --base-href "/app/"

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DIRECT_SSH_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "build/web/"
          target: "/mnt/marichia/files/easytech-new-api/app"

      - name: Flatten app dir (if scp created web/ inside app)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DIRECT_SSH_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /mnt/marichia/files/easytech-new-api/app
            if [ -d web ]; then mv web/* . 2>/dev/null; rmdir web 2>/dev/null; true; fi
            echo "Deployed."
