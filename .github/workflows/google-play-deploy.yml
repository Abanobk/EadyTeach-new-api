name: Google Play Deploy
on:
  push:
    tags:
      - 'v*' # هيشتغل لما كورسيس يعمل Tag للنسخة بـ v1.0.0 مثلاً

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          # Decode keystore: strip all whitespace (macOS base64 often wraps lines) then base64-decode.
          python3 - <<'PY'
          import base64
          import os
          import pathlib

          raw = os.environ.get("ANDROID_KEYSTORE_BASE64", "")
          s = "".join(raw.split())
          print(f"ANDROID_KEYSTORE_BASE64 length (after whitespace strip): {len(s)}")
          if not s:
              raise SystemExit("ANDROID_KEYSTORE_BASE64 is empty")
          pad = (-len(s)) % 4
          s += "=" * pad
          data = base64.b64decode(s, validate=False)
          print(f"Decoded keystore size (bytes): {len(data)}")
          if len(data) < 100:
              raise SystemExit(
                  "Decoded keystore too small (got "
                  + str(len(data))
                  + " bytes). Base64 length was "
                  + str(len("".join(raw.split())))
                  + ". Expected thousands of bytes for a real .jks — the GitHub secret is likely truncated, "
                  "wrong paste, or not the keystore file. Fix: run on Mac "
                  "`base64 -i android/app/upload-keystore.jks > /tmp/ks.b64` then "
                  "`gh secret set ANDROID_KEYSTORE_BASE64 < /tmp/ks.b64` (avoids browser paste limits)."
              )
          pathlib.Path("android/app/upload-keystore.jks").write_bytes(data)
          PY

          # android/app/build.gradle reads android/key.properties — strip spaces (alias/password paste often has trailing space)
          python3 - <<'PY'
          import pathlib
          import os

          def strip_env(name: str) -> str:
              return (os.environ.get(name) or "").strip()

          pathlib.Path("android/key.properties").write_text(
              "\n".join(
                  [
                      f"storePassword={strip_env('ANDROID_KEYSTORE_PASSWORD')}",
                      f"keyPassword={strip_env('ANDROID_KEY_PASSWORD')}",
                      f"keyAlias={strip_env('ANDROID_KEY_ALIAS')}",
                      "storeFile=upload-keystore.jks",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          PY

          test -s android/app/upload-keystore.jks
          test -s android/key.properties

      - name: Verify signing secrets (no values printed)
        run: |
          python3 - <<'PY'
          import pathlib
          txt = pathlib.Path("android/key.properties").read_text(encoding="utf-8")
          for raw in txt.splitlines():
            line = raw.strip()
            if not line or line.startswith("#"):
              continue
            if "=" not in line:
              continue
            k, v = line.split("=", 1)
            k, v = k.strip(), v.strip()
            if not v:
              raise SystemExit(
                f"Empty value for '{k}' in android/key.properties. "
                "In GitHub: Settings → Secrets → Actions → ensure ANDROID_KEYSTORE_PASSWORD, "
                "ANDROID_KEY_PASSWORD, and ANDROID_KEY_ALIAS are set (names must match exactly)."
              )
          print("key.properties OK (all keys non-empty).")
          PY
          ls -la android/key.properties android/app/upload-keystore.jks

      - name: Verify keystore alias exists (keytool)
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys

          store_pass = (os.environ.get("ANDROID_KEYSTORE_PASSWORD") or "").strip()
          want = (os.environ.get("ANDROID_KEY_ALIAS") or "").strip()
          ks = "android/app/upload-keystore.jks"

          if not store_pass or not want:
              print("ANDROID_KEYSTORE_PASSWORD or ANDROID_KEY_ALIAS is empty after strip.", file=sys.stderr)
              sys.exit(1)

          r = subprocess.run(
              [
                  "keytool",
                  "-list",
                  "-v",
                  "-keystore",
                  ks,
                  "-storepass",
                  store_pass,
              ],
              capture_output=True,
              text=True,
          )
          if r.returncode != 0:
              print("keytool failed (wrong store password or corrupt keystore?). stderr:", file=sys.stderr)
              print(r.stderr, file=sys.stderr)
              sys.exit(1)

          aliases = []
          for line in r.stdout.splitlines():
              m = re.match(r"^\s*Alias name:\s*(.+)\s*$", line)
              if m:
                  aliases.append(m.group(1).strip())

          if not aliases:
              print("Could not parse any 'Alias name:' from keytool -list -v output.", file=sys.stderr)
              print(r.stdout[:4000], file=sys.stderr)
              sys.exit(1)

          if want not in aliases:
              print(
                  "ANDROID_KEY_ALIAS does not match this keystore.\n"
                  f"  Secret alias (after strip): {want!r}\n"
                  f"  Aliases in decoded {ks}: {aliases!r}\n"
                  "Fix: set GitHub secret ANDROID_KEY_ALIAS to exactly one of those names, "
                  "or re-upload ANDROID_KEYSTORE_BASE64 from the same upload-keystore.jks you use locally "
                  "(run: keytool -list -v -keystore android/app/upload-keystore.jks).",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"Keystore alias OK: {want!r} is present ({len(aliases)} entr(y/ies)).")
          PY

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release Bundle
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          # Raw JSON (not a path). Valid inputs: serviceAccountJson | serviceAccountJsonPlainText
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.easytech.easy_tech_flutter
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal # بيبدأ برفعه على الـ Internal testing عشان تجربه الأول
