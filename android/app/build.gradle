plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Firebase Google Services
    id "com.google.gms.google-services"
}

// Load signing credentials from android/key.properties (do not commit secrets).
// Google Play requires all release AAB/APKs to be signed with your upload key; this wires that keystore to the release build type.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists() && keystorePropertiesFile.length() > 0) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// Resolve keystore path once (android/app/<storeFile>) — same as file("upload-keystore.jks") from this module.
def releaseKeystoreFile = keystorePropertiesFile.exists()
    ? rootProject.file("app/${keystoreProperties.getProperty('storeFile', 'upload-keystore.jks')}")
    : null

// Pre-read strings so signingConfigs closure always gets non-null assignments when key.properties is present.
def ksStorePassword = keystoreProperties.getProperty('storePassword')
def ksKeyPassword = keystoreProperties.getProperty('keyPassword')
def ksKeyAlias = keystoreProperties.getProperty('keyAlias')
def hasUploadSigning = ksStorePassword && ksKeyPassword && ksKeyAlias && releaseKeystoreFile != null && releaseKeystoreFile.exists()

android {
    namespace = "com.easytech.easy_tech_flutter"
    // Fail fast only when key.properties is complete but the keystore file is missing.
    if (ksStorePassword && ksKeyPassword && ksKeyAlias && releaseKeystoreFile != null && !releaseKeystoreFile.exists()) {
        throw new GradleException(
            "Release keystore not found: ${releaseKeystoreFile.absolutePath}. " +
            "Place your upload-keystore.jks under android/app/ or update storeFile in android/key.properties."
        )
    }
    // ملاحظة: geolocator_android يتطلب Android SDK 36
    compileSdk = 36
    ndkVersion = "26.1.10909125"

    compileOptions {
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.easytech.easy_tech_flutter"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    // Release signing: values from key.properties only (no passwords in this file).
    signingConfigs {
        release {
            if (hasUploadSigning) {
                keyAlias = ksKeyAlias
                keyPassword = ksKeyPassword
                storePassword = ksStorePassword
                storeFile = releaseKeystoreFile
            } else {
                // CI must never fall back to ~/.android/debug.keystore (often missing on Linux runners).
                def onCi = System.getenv("GITHUB_ACTIONS") == "true" || System.getenv("CI") == "true"
                if (onCi) {
                    throw new GradleException(
                        "Release signing not configured for CI. Ensure the workflow creates android/key.properties and android/app/upload-keystore.jks " +
                        "and GitHub secrets ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS are set. " +
                        "Also confirm the git tag points to a commit that includes the Prepare Android signing files workflow step."
                    )
                }
                // Local dev only: debug signing (not for Play).
                storeFile = file("${System.getProperty('user.home')}/.android/debug.keystore")
                storePassword = "android"
                keyAlias = "androiddebugkey"
                keyPassword = "android"
            }
        }
    }
    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

flutter {
    source = "../.."
}
